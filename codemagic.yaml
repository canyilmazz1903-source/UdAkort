workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android --no-install
      - name: Build Android
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/**/*.apk

  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS (Simulator)
        script: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
            -scheme "UdAkort" \
            -configuration Debug \
            -sdk iphonesimulator \
            clean build \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/build/**/*.app

  react-native-ios-appstore:
    name: React Native iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic API
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.udakort.app" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          xcode-project use-profiles
      - name: Build and Export IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/UdAkort.xcworkspace \
            --scheme "UdAkort" \
            --verbose || {
              echo "=== Export IPA Failed. Printing Codemagic Logs ==="
              cat $TMPDIR/codemagic-*.log 2>/dev/null || cat /var/folders/*/*/*/T/codemagic-*.log 2>/dev/null
              exit 1
            }
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
